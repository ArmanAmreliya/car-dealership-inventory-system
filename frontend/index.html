    <!-- JSON-LD -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "DealerFlow",
      "description": "Enterprise AI-powered dealership management platform",
      "url": "https://dealerflow.com",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "Web",
      "offers": {
        "@type": "Offer",
        "price": "99",
        "priceCurrency": "USD",
        "description": "Starting at $99/month"
      },
      "aggregateRating": {
        "@type": "AggregateRating",
        "ratingValue": "4.8",
        "ratingCount": "127"
      }
    }
    </script>
    
    <script>
      // Clear any existing service workers
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
          registrations.forEach(function(registration) {
            console.log('[index.html] Unregistering service worker:', registration.scope);
            registration.unregister();
          });
        });
      }
      
      // Clear all caches
      if ('caches' in window) {
        caches.keys().then(function(cacheNames) {
          cacheNames.forEach(function(cacheName) {
            console.log('[index.html] Deleting cache:', cacheName);
            caches.delete(cacheName);
          });
        });
      }
      
      // Force reload to clear any cached HTML
      if (performance.navigation.type === 1) {
        console.log('[index.html] Page was reloaded, clearing session storage');
        sessionStorage.clear();
      }
    </script>
  </head>
